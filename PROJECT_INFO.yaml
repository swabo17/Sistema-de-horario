# ==============================================================================
# DOCUMENTACIÓN DISPONIBLE
# ==============================================================================

DOCUMENTACION:
  
  Usuarios:
    - README.md: Visión general y requerimientos
    - INSTALL.md: Instalación paso a paso
    - Frontend UI: Interfaz intuitiva con ayuda emergente

  Desarrolladores:
    - docs/API_REFERENCE.md: Endpoints y modelos
    - docs/FORMULATION.md: Matemática detallada
